name: MSBuild

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  actions: write

jobs:
  build:
    runs-on: windows-2025-vs2026

    strategy:
      matrix:
        BUILD_PLATFORM: [x86, x64]
        include:
          - BUILD_PLATFORM: x86
            triplet: x86-windows-static
          - BUILD_PLATFORM: x64
            triplet: x64-windows-static

    env:
      SOLUTION_FILE_PATH: .
      BUILD_CONFIGURATION: Release

    steps:
    - uses: actions/checkout@v6

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v3
      
    - name: Build
      working-directory: ${{ github.workspace }}
      # Add additional options to the MSBuild command line here (like platform or verbosity level).
      # See https://docs.microsoft.com/visualstudio/msbuild/msbuild-command-line-reference
      run: msbuild /m /p:Configuration=${{ env.BUILD_CONFIGURATION }} /p:Platform=${{ matrix.BUILD_PLATFORM }} ${{ env.SOLUTION_FILE_PATH }}

    - name: Find vstest.console.exe
      id: find-vstest
      shell: pwsh
      run: |
        $vstest = Get-ChildItem -Path "C:\Program Files\Microsoft Visual Studio" `
          -Recurse -Filter "vstest.console.exe" `
          -ErrorAction SilentlyContinue `
          | Select-Object -First 1 -ExpandProperty FullName
        if (-not $vstest) { throw "vstest.console.exe not found" }
        Write-Host "Found: $vstest"
        echo "VSTEST_PATH=$vstest" >> $env:GITHUB_OUTPUT

    - name: Run VSTest
      shell: pwsh
      run: |
        $testDlls = Get-ChildItem `
          -Path "${{ github.workspace }}/${{ matrix.BUILD_PLATFORM }}/${{ env.BUILD_CONFIGURATION }}/" `
          -Recurse `
          -Filter "*Tests.dll" `
          | Select-Object -ExpandProperty FullName
        if (-not $testDlls) { throw "No test DLLs found" }
        Write-Host "Test DLLs found:"
        $testDlls | ForEach-Object { Write-Host "  $_" }
        & "${{ steps.find-vstest.outputs.VSTEST_PATH }}" $testDlls `
          /Platform:${{ matrix.BUILD_PLATFORM }} `
          /Parallel `
          /Logger:trx `
          /ResultsDirectory:"${{ github.workspace }}/TestResults/${{ matrix.BUILD_PLATFORM }}"

    - name: Upload test results
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: vs-test-result-logs-${{ matrix.BUILD_PLATFORM }}
        path: ${{ github.workspace }}/TestResults/${{ matrix.BUILD_PLATFORM }}/*.trx
